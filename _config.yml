keywords: Java, AI, Developer
lang: en
icon: ⚛️

# ！！！重要：网站地址配置 ！！！
url: "https://finch04.github.io"  # 必须用引号括起来
baseurl: ""  # 必须用引号括起来，留空表示根目录
repository: finch04/finch04.github.io  # al-folio 必需

last_updated: false
impressum_path: 
back_to_top: true

# -----------------------------------------------------------------------------
# Author information
# -----------------------------------------------------------------------------

author:
  name: "Finch"
  email: "1418875140@qq.com"
  github: "finch04"
  avatar: "/assets/img/profile.png"

# Social links
social:
  github: finch04
  email: 1418875140@qq.com

# Custom navigation
navbar_items:
  - name: 关于我
    link: /
  - name: 博客
    link: https://blog.csdn.net/weixin_73195042
  - name: 社团
    link: https://osc.tsguas.cn/
  - name: Gitee
    link: https://gitee.com/fu-shenqi

# -----------------------------------------------------------------------------
# al-folio theme configuration
# -----------------------------------------------------------------------------

# Theme
theme: al-folio

# 启用功能
enable_darkmode: true
enable_math: true
enable_masonry: true
enable_medium_zoom: true
enable_progressbar: true
enable_navbar_social: false
enable_project_categories: true
enable_tooltips: false
enable_cookie_consent: false

# Layout
navbar_fixed: true
footer_fixed: true
search_enabled: true
socials_in_search: true
posts_in_search: true
bib_search: true
max_width: 930px

# Blog
blog_name: al-folio
blog_description: Finch's personal blog
permalink: /blog/:year/:title/
pagination:
  enabled: true

# -----------------------------------------------------------------------------
# Giscus comments (Disable if not needed)
# -----------------------------------------------------------------------------

giscus:
  repo: finch04/finch04.github.io
  repo_id: ""
  category: Comments
  category_id: ""
  mapping: title
  strict: 1
  reactions_enabled: 1
  input_position: bottom
  dark_theme: dark
  light_theme: light
  emit_metadata: 0
  lang: en

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

include: ["_pages"]
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .bundle
  - .jekyll-cache
  - .sass-cache

keep_files:
  - CNAME
  - .nojekyll

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate-v2
  - jekyll/scholar

# Collections
collections:
  publications:
    output: true
  projects:
    output: true
  news:
    output: true
  teaching:
    output: true

# Scholar settings
scholar:
  style: apa
  locale: en
  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib
  query: "@*"
  group_by: year
  group_order: descending

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
