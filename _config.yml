# -----------------------------------------------------------------------------
# al-folio configuration (必须保留这些插件)
# -----------------------------------------------------------------------------

# 核心主题 - 必须保留
theme: al_folio_core

# 必须包含的插件列表
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate-v2
  - jekyll/scholar
  # al-folio 必需插件 (thin-starter契约要求)
  - al_folio_core
  - al_folio_distill
  - al_cookie
  - al_icons
  - al_math

# -----------------------------------------------------------------------------
# al-folio 功能开关
# -----------------------------------------------------------------------------

enable_darkmode: true
enable_math: true  # 如果启用，必须包含 al_math 插件
enable_masonry: true
enable_medium_zoom: true
enable_progressbar: true
enable_navbar_social: false
enable_project_categories: true
enable_tooltips: false
enable_cookie_consent: true  # 如果启用，必须包含 al_cookie 插件

# Layout
navbar_fixed: true
footer_fixed: true
search_enabled: true
socials_in_search: true
posts_in_search: true
bib_search: true
max_width: 930px

# Blog
blog_name: al-folio
blog_description: Finch's personal blog
permalink: /blog/:year/:title/
pagination:
  enabled: true

